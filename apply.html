<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Apply for Job</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body data-page="apply">
  <header class="top container">
    <h1>Apply</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="listings.html">Find Jobs</a>
      <a href="postings.html">Post a Job</a>
      <a href="signin.html">Sign In</a>
    </nav>
  </header>

  <main class="container">
    <button class="back"><a href="#" id="backToDetails">← Back</a></button>
    <section class="card">
      <h2 id="applyFor">Apply</h2>
      <form id="applyForm" novalidate>
        <label>Full Name <input name="name" required></label>
        <label>Email <input name="email" type="email" required></label>
        <label>Phone Number <input name="phone" required></label>
        <label>Upload CV (simulated) <input name="cv" type="file" accept=".pdf,.doc,.docx"></label>
        <div class="row">
          <button type="submit" class="btn">Submit Application</button>
          <a href="listings.html" class="btn outline">Cancel</a>
        </div>
        <p id="applyMsg" class="muted"></p>
      </form>
    </section>
  </main>

  <footer class="container muted small">web developement project for level 200 students from LMUI2026</footer>
  <script src="js/site.js" defer></script>
</body>
</html>
